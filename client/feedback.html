<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolution Feedback - Grievance Hub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  
  <style>
    .star-rating {
      display: flex;
      gap: 0.5rem;
      font-size: 2rem;
      color: var(--text-tertiary);
      cursor: pointer;
    }
    .star-rating i.active {
      color: var(--color-warning);
    }
  </style>
</head>
<body>

  <div class="dashboard-wrapper">
    <aside id="sidebar-container"></aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-premium border-0 p-2" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <h4 class="fw-bold mb-0">Citizen Feedback</h4>
        </div>
        <div class="d-flex align-items-center gap-3">
          <button id="theme-toggle" class="btn btn-outline-premium p-2 border-0"></button>
          <span class="badge bg-primary px-3 py-2">CITIZEN</span>
        </div>
      </header>

      <div class="dashboard-content d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-panel p-4 p-md-5 w-100" style="max-width: 550px;">
          <div class="text-center mb-4">
            <i class="fas fa-medal fa-3x text-warning mb-3"></i>
            <h4 class="fw-bold">Rate Case Resolution</h4>
            <p class="text-secondary small">Your feedback helps us monitor official accountability.</p>
          </div>

          <form id="feedback-form">
            <div class="mb-4">
              <label class="form-label small fw-bold">Select Resolved Grievance</label>
              <select id="feedback-complaint" class="form-select form-control-premium w-100" required>
                <option value="">Choose Case...</option>
                <!-- Populated dynamically -->
              </select>
            </div>

            <div class="mb-4 text-center">
              <label class="form-label small fw-bold d-block mb-2">Quality of Service Rating</label>
              <div class="star-rating justify-content-center" id="stars-container">
                <i class="far fa-star" data-rating="1"></i>
                <i class="far fa-star" data-rating="2"></i>
                <i class="far fa-star" data-rating="3"></i>
                <i class="far fa-star" data-rating="4"></i>
                <i class="far fa-star" data-rating="5"></i>
              </div>
              <input type="hidden" id="selected-rating" required value="">
            </div>

            <div class="mb-4">
              <label class="form-label small fw-bold">Suggestions or Comments</label>
              <textarea id="feedback-comments" class="form-control form-control-premium w-100" rows="3" placeholder="Tell us about your redressal experience..."></textarea>
            </div>

            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="anonymous-toggle">
              <label class="form-check-label small text-secondary" for="anonymous-toggle">Submit as Anonymous Survey</label>
            </div>

            <button type="submit" class="btn btn-premium w-100 py-2.5">
              <i class="fas fa-paper-plane me-2"></i>Send Feedback
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  
  <script>
    let selectedRatingVal = 0;

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // Set up star selection listeners
    const stars = document.querySelectorAll('#stars-container i');
    stars.forEach(star => {
      star.addEventListener('click', () => {
        const rating = parseInt(star.getAttribute('data-rating'));
        selectedRatingVal = rating;
        document.getElementById('selected-rating').value = rating;
        
        // Highlight active stars
        stars.forEach((s, idx) => {
          if (idx < rating) {
            s.className = 'fas fa-star active';
          } else {
            s.className = 'far fa-star';
          }
        });
      });
    });

    async function loadResolvedComplaints() {
      try {
        const res = await apiRequest('/complaints?status=Resolved');
        const data = await res.json();
        
        if (data.success) {
          const select = document.getElementById('feedback-complaint');
          data.data.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c._id;
            opt.textContent = `${c.complaintNumber} - ${c.category || 'General'}`;
            select.appendChild(opt);
          });
        }
      } catch (err) {
        showToast('Error loading complaints list', 'error');
      }
    }

    const form = document.getElementById('feedback-form');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const complaintId = document.getElementById('feedback-complaint').value;
        const comments = document.getElementById('feedback-comments').value;
        const isAnonymous = document.getElementById('anonymous-toggle').checked;

        if (selectedRatingVal === 0) {
          showToast('Please select a star rating.', 'error');
          return;
        }

        try {
          const res = await apiRequest('/feedback', {
            method: 'POST',
            body: { complaintId, rating: selectedRatingVal, comments, isAnonymous }
          });
          const data = await res.json();
          if (data.success) {
            showToast('Feedback submitted! Case closed.', 'success');
            setTimeout(() => {
              window.location.href = '/citizen/dashboard.html';
            }, 1000);
          } else {
            showToast(data.message, 'error');
          }
        } catch (err) {
          showToast('Failed to submit feedback.', 'error');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth(['citizen']);
      loadResolvedComplaints();
    });
  </script>
</body>
</html>
