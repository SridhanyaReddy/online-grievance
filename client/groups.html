<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum Groups - Grievance Hub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

  <div class="dashboard-wrapper">
    <!-- Sidebar Container -->
    <aside id="sidebar-container"></aside>

    <!-- Main Workspace -->
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-premium border-0 p-2" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <h4 class="fw-bold mb-0">Discussion Groups</h4>
        </div>
        <div class="d-flex align-items-center gap-3">
          <button id="theme-toggle" class="btn btn-outline-premium p-2 border-0"></button>
          <span class="badge bg-primary px-3 py-2" id="role-badge">CITIZEN</span>
        </div>
      </header>

      <div class="dashboard-content">
        <div class="row g-4">
          
          <!-- Left Panel: Groups List & Create -->
          <div class="col-md-4">
            <div class="glass-panel p-3 mb-4">
              <h5 class="fw-bold mb-3">Launch Discussion Group</h5>
              <form id="group-form" class="d-flex flex-column gap-2">
                <input type="text" id="grp-name" class="form-control form-control-premium" required placeholder="Group Name">
                <input type="text" id="grp-desc" class="form-control form-control-premium" placeholder="Short description">
                <button type="submit" class="btn btn-premium w-100">Create Group</button>
              </form>
            </div>

            <div class="glass-panel p-3">
              <h5 class="fw-bold mb-3">Available Groups</h5>
              <div id="groups-list" class="list-group d-flex flex-column gap-2" style="max-height: 400px; overflow-y: auto;">
                <!-- Populated dynamically -->
              </div>
            </div>
          </div>

          <!-- Right Panel: Posts Feed inside selected group -->
          <div class="col-md-8">
            <div id="forum-feed-placeholder" class="glass-panel p-5 text-center text-secondary">
              <i class="fas fa-comments fa-3x mb-3 text-tertiary"></i>
              <h5>Select a discussion group on the left to load posts feed.</h5>
            </div>

            <!-- Active Forum Feed Block -->
            <div id="forum-feed-container" class="d-none">
              <div class="glass-panel p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h4 class="fw-extrabold mb-0 text-primary" id="active-group-title">Road Infrastructure Discussion</h4>
                  <button class="btn btn-premium btn-sm" onclick="togglePostForm()">
                    <i class="fas fa-edit me-2"></i>New Post
                  </button>
                </div>
                
                <!-- Create Post Form -->
                <form id="post-form" class="d-none border-top pt-3 mt-3">
                  <div class="mb-3">
                    <label class="form-label small fw-bold">Post Title</label>
                    <input type="text" id="post-title" class="form-control form-control-premium w-100" required placeholder="State core concern...">
                  </div>
                  <div class="mb-3">
                    <label class="form-label small fw-bold">Post Body Content</label>
                    <textarea id="post-content" class="form-control form-control-premium w-100" rows="3" required placeholder="Detailed message description..."></textarea>
                  </div>
                  <div class="text-end">
                    <button type="button" class="btn btn-outline-premium me-2" onclick="togglePostForm()">Cancel</button>
                    <button type="submit" class="btn btn-premium">Publish Post</button>
                  </div>
                </form>
              </div>

              <!-- Posts List Feed -->
              <div id="posts-list" class="d-flex flex-column gap-3"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Comments thread popup Modal -->
  <div class="modal fade" id="commentsModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content glass-panel p-4" style="border: 1px solid var(--border-color);">
        <div class="modal-header border-0 p-0 mb-3 justify-content-between">
          <h5 class="modal-title fw-bold" id="comments-modal-title">Comments</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div id="post-replies-list" class="mb-3" style="max-height: 300px; overflow-y: auto;"></div>
          <form id="comment-form" class="d-flex gap-2">
            <input type="text" id="com-content" class="form-control form-control-premium" required placeholder="Add a reply...">
            <button type="submit" class="btn btn-premium btn-sm">Reply</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  
  <script>
    let activeGroupId = null;
    let activePostId = null;
    let commentsModal = null;

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function togglePostForm() {
      document.getElementById('post-form').classList.toggle('d-none');
    }

    async function loadGroups() {
      try {
        const res = await apiRequest('/groups');
        const data = await res.json();
        if (data.success) {
          renderGroups(data.data);
        }
      } catch (err) {
        showToast('Error groups loading', 'error');
      }
    }

    function renderGroups(list) {
      const parent = document.getElementById('groups-list');
      parent.innerHTML = '';

      list.forEach(g => {
        const item = document.createElement('a');
        item.href = '#';
        item.className = 'list-group-item list-group-item-action glass-card py-2 px-3';
        item.innerHTML = `
          <div class="fw-bold">${g.name}</div>
          <div class="small text-secondary text-truncate">${g.description || 'Public Forum'}</div>
        `;
        item.addEventListener('click', (e) => {
          e.preventDefault();
          selectGroup(g._id, g.name);
        });
        parent.appendChild(item);
      });
    }

    async function selectGroup(id, name) {
      activeGroupId = id;
      document.getElementById('forum-feed-placeholder').classList.add('d-none');
      document.getElementById('forum-feed-container').classList.remove('d-none');
      document.getElementById('active-group-title').textContent = name;
      
      loadPosts();
    }

    async function loadPosts() {
      try {
        const res = await apiRequest(`/groups/${activeGroupId}/posts`);
        const data = await res.json();
        if (data.success) {
          renderPosts(data.data);
        }
      } catch (err) {
        showToast('Failed to load posts', 'error');
      }
    }

    function renderPosts(list) {
      const container = document.getElementById('posts-list');
      container.innerHTML = '';

      if (list.length === 0) {
        container.innerHTML = '<div class="glass-panel p-4 text-center text-secondary">No discussions launched in this group yet. Start one!</div>';
        return;
      }

      list.forEach(p => {
        const postCard = document.createElement('div');
        postCard.className = 'glass-card';
        postCard.innerHTML = `
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="fw-bold text-primary mb-0">${p.title}</h5>
            <span class="small text-secondary">${new Date(p.createdAt).toLocaleDateString()}</span>
          </div>
          <p class="small text-secondary mb-3">${p.content}</p>
          <div class="d-flex justify-content-between align-items-center pt-2 border-top">
            <span class="small text-secondary">Posted by: <strong>${p.author?.name}</strong> (${p.author?.role})</span>
            <div class="d-flex gap-2">
              <button onclick="likePost('${p._id}')" class="btn btn-outline-premium btn-sm py-1">
                <i class="fas fa-heart text-danger me-1"></i>${p.likes.length}
              </button>
              <button onclick="openReplies('${p._id}', '${p.title}')" class="btn btn-premium btn-sm py-1">
                <i class="fas fa-comment me-1"></i>Reply Feed
              </button>
            </div>
          </div>
        `;
        container.appendChild(postCard);
      });
    }

    async function likePost(postId) {
      try {
        const res = await apiRequest(`/groups/posts/${postId}/like`, { method: 'POST' });
        if (res.status === 200) {
          loadPosts();
        }
      } catch (err) {
        console.error('Like request failed:', err);
      }
    }

    async function openReplies(postId, title) {
      activePostId = postId;
      document.getElementById('comments-modal-title').textContent = `Discussion on: "${title.substring(0,25)}..."`;
      loadComments();
      commentsModal.show();
    }

    async function loadComments() {
      try {
        const res = await apiRequest(`/groups/posts/${activePostId}/comments`);
        const data = await res.json();
        if (data.success) {
          const list = document.getElementById('post-replies-list');
          list.innerHTML = '';
          if (data.data.length === 0) {
            list.innerHTML = '<p class="text-center small text-secondary py-3">No replies yet. Type one below!</p>';
          } else {
            data.data.forEach(c => {
              const row = document.createElement('div');
              row.className = 'mb-2 p-2 border-bottom';
              row.innerHTML = `
                <div class="d-flex justify-content-between small">
                  <strong>${c.author?.name}</strong>
                  <span class="text-secondary small">${new Date(c.createdAt).toLocaleDateString()}</span>
                </div>
                <p class="small text-secondary mb-0 mt-1">${c.content}</p>
              `;
              list.appendChild(row);
            });
          }
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Comment Form submit
    const commentForm = document.getElementById('comment-form');
    if (commentForm) {
      commentForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const content = document.getElementById('com-content').value;

        try {
          const res = await apiRequest(`/groups/posts/${activePostId}/comments`, {
            method: 'POST',
            body: { content }
          });
          if (res.status === 201) {
            document.getElementById('com-content').value = '';
            loadComments();
          }
        } catch (err) {
          showToast('Failed to add reply', 'error');
        }
      });
    }

    // Group Form submit
    const groupForm = document.getElementById('group-form');
    if (groupForm) {
      groupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('grp-name').value;
        const description = document.getElementById('grp-desc').value;

        try {
          const res = await apiRequest('/groups', {
            method: 'POST',
            body: { name, description }
          });
          const data = await res.json();
          if (data.success) {
            showToast('Group created successfully!', 'success');
            groupForm.reset();
            loadGroups();
          } else {
            showToast(data.message, 'error');
          }
        } catch (err) {
          showToast('Creation failed.', 'error');
        }
      });
    }

    // Post Form submit
    const postForm = document.getElementById('post-form');
    if (postForm) {
      postForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('post-title').value;
        const content = document.getElementById('post-content').value;

        try {
          const res = await apiRequest(`/groups/${activeGroupId}/posts`, {
            method: 'POST',
            body: { title, content }
          });
          if (res.status === 201) {
            showToast('Post published successfully!', 'success');
            postForm.reset();
            togglePostForm();
            loadPosts();
          }
        } catch (err) {
          showToast('Publish failed.', 'error');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      const user = getUser();
      document.getElementById('role-badge').textContent = user.role.toUpperCase();

      commentsModal = new bootstrap.Modal(document.getElementById('commentsModal'));
      loadGroups();
    });
  </script>
</body>
</html>
