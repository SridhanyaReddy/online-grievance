<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Redirector - Grievance Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-primary">
  <div class="text-center glass-panel p-5">
    <div class="spinner-border text-primary mb-4" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <h4 class="fw-bold">Securing session...</h4>
    <p class="text-secondary mb-0">Redirecting to your designated redressal workspace.</p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = getUser();
      if (!user) {
        window.location.href = '/login.html';
      } else {
        window.location.href = `/${user.role}/dashboard.html`;
      }
    });
  </script>
</body>
</html>
