<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Dashboard - Grievance Hub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

  <div class="dashboard-wrapper">
    <aside id="sidebar-container"></aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-premium border-0 p-2" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <h4 class="fw-bold mb-0">Officer Workstation</h4>
        </div>
        <div class="d-flex align-items-center gap-3">
          <button id="theme-toggle" class="btn btn-outline-premium p-2 border-0"></button>
          <span class="badge bg-primary px-3 py-2" id="employee-badge">FIELD OFFICER</span>
        </div>
      </header>

      <div class="dashboard-content">
        <!-- Top Metrics Cards -->
        <div class="stats-grid">
          <div class="metric-card glass-panel">
            <div class="metric-info">
              <h3 id="stat-total">0</h3>
              <p>Total Cases</p>
            </div>
            <div class="metric-icon-box bg-info-glow"><i class="fas fa-tasks"></i></div>
          </div>
          <div class="metric-card glass-panel">
            <div class="metric-info">
              <h3 id="stat-assigned">0</h3>
              <p>Assigned Cases</p>
            </div>
            <div class="metric-icon-box bg-warning-glow"><i class="fas fa-route"></i></div>
          </div>
          <div class="metric-card glass-panel">
            <div class="metric-info">
              <h3 id="stat-resolved">0</h3>
              <p>Resolved Actions</p>
            </div>
            <div class="metric-icon-box bg-success-glow"><i class="fas fa-check-double"></i></div>
          </div>
        </div>

        <div class="row g-4">
          <!-- Active assigned complaints -->
          <div class="col-lg-8">
            <div class="glass-panel p-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">Active Assigned Cases</h5>
                <a href="/complaints.html" class="btn btn-sm btn-outline-premium">All Cases</a>
              </div>
              <div class="table-responsive">
                <table class="premium-table">
                  <thead>
                    <tr>
                      <th>Grievance ID</th>
                      <th>Category</th>
                      <th>Location</th>
                      <th>Priority</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody id="cases-tbody">
                    <!-- Populated dynamically -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Alert Notifications feed -->
          <div class="col-lg-4">
            <div class="glass-panel p-4 h-100">
              <h5 class="fw-bold mb-3"><i class="fas fa-bell me-2 text-primary"></i>Alert Center</h5>
              <div class="list-group d-flex flex-column gap-2" id="alerts-container" style="max-height: 350px; overflow-y: auto;">
                <!-- Populated dynamically -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    async function loadDashboard() {
      try {
        const res = await apiRequest('/reports/dashboard-stats');
        const data = await res.json();
        if (data.success) {
          document.getElementById('stat-total').textContent = data.data.complaints.total;
          document.getElementById('stat-assigned').textContent = data.data.complaints.pending;
          document.getElementById('stat-resolved').textContent = data.data.complaints.resolved;
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadAssignedCases() {
      try {
        const res = await apiRequest('/complaints?status=Assigned');
        const data = await res.json();
        if (data.success) {
          const tbody = document.getElementById('cases-tbody');
          tbody.innerHTML = '';

          if (data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-secondary py-3">No active assigned cases in queue.</td></tr>';
            return;
          }

          data.data.slice(0, 5).forEach(c => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td><strong class="text-primary">${c.complaintNumber}</strong></td>
              <td>${c.category}</td>
              <td>${c.location}</td>
              <td><span class="badge bg-secondary">${c.priority.toUpperCase()}</span></td>
              <td>
                <a href="/complaints.html" class="btn btn-premium btn-sm py-1">View Details</a>
              </td>
            `;
            tbody.appendChild(row);
          });
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadAlerts() {
      try {
        const res = await apiRequest('/notifications');
        const data = await res.json();
        if (data.success) {
          const container = document.getElementById('alerts-container');
          container.innerHTML = '';

          if (data.data.length === 0) {
            container.innerHTML = '<p class="small text-secondary py-3 text-center">No alerts in your queue.</p>';
            return;
          }

          data.data.slice(0, 5).forEach(notif => {
            const div = document.createElement('div');
            div.className = `list-group-item glass-card py-2 px-3 ${notif.isRead ? '' : 'border-primary'}`;
            div.innerHTML = `
              <div class="fw-bold small text-primary">${notif.title}</div>
              <p class="small text-secondary mb-0" style="font-size:0.75rem;">${notif.message}</p>
            `;
            container.appendChild(div);
          });
        }
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth(['employee']);
      const user = getUser();
      document.getElementById('employee-badge').textContent = `${user.name.toUpperCase()} WORKSPACE`;
      
      loadDashboard();
      loadAssignedCases();
      loadAlerts();
    });
  </script>
</body>
</html>
