<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings - Grievance Hub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

  <div class="dashboard-wrapper">
    <aside id="sidebar-container"></aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-outline-premium border-0 p-2" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <h4 class="fw-bold mb-0">My Profile</h4>
        </div>
        <div class="d-flex align-items-center gap-3">
          <button id="theme-toggle" class="btn btn-outline-premium p-2 border-0"></button>
          <span class="badge bg-primary px-3 py-2" id="role-badge">USER</span>
        </div>
      </header>

      <div class="dashboard-content d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-panel p-4 p-md-5 w-100" style="max-width: 600px;">
          <div class="text-center mb-4">
            <div class="position-relative d-inline-block">
              <img id="profile-pic-preview" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80" 
                   class="rounded-circle border border-3 border-primary shadow" width="120" height="120" style="object-fit: cover;">
              <label for="profile-avatar" class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle p-2" style="cursor: pointer;" title="Upload Photo">
                <i class="fas fa-camera"></i>
              </label>
              <input type="file" id="profile-avatar" class="d-none" accept="image/*" onchange="previewAvatar()">
            </div>
            <h4 class="fw-bold mt-3" id="profile-name-header">Loading...</h4>
            <p class="text-secondary small" id="profile-email-header">loading...</p>
          </div>

          <form id="profile-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small fw-bold">Full Name</label>
                <input type="text" id="prof-name" class="form-control form-control-premium w-100" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold">Assigned Department</label>
                <input type="text" id="prof-dept" class="form-control form-control-premium w-100" disabled placeholder="None">
              </div>
              <div class="col-12">
                <label class="form-label small fw-bold">Email (Read Only)</label>
                <input type="email" id="prof-email" class="form-control form-control-premium w-100" disabled>
              </div>
              <div class="col-12">
                <label class="form-label small fw-bold">Change Password</label>
                <input type="password" id="prof-password" class="form-control form-control-premium w-100" placeholder="Enter new password to update">
              </div>
              <div class="col-12 text-end mt-4">
                <button type="submit" class="btn btn-premium w-100 py-2.5">
                  <i class="fas fa-save me-2"></i>Save Changes
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    async function loadProfile() {
      try {
        const res = await apiRequest('/users/me');
        const data = await res.json();
        
        if (data.success) {
          const user = data.data;
          document.getElementById('prof-name').value = user.name;
          document.getElementById('prof-email').value = user.email;
          document.getElementById('profile-name-header').textContent = user.name;
          document.getElementById('profile-email-header').textContent = user.email;
          document.getElementById('role-badge').textContent = user.role.toUpperCase();

          if (user.department) {
            document.getElementById('prof-dept').value = user.department.name;
          }

          if (user.profilePic) {
            document.getElementById('profile-pic-preview').src = user.profilePic;
          }
        }
      } catch (err) {
        showToast('Error loading profile', 'error');
      }
    }

    function previewAvatar() {
      const file = document.getElementById('profile-avatar').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('profile-pic-preview').src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }

    const form = document.getElementById('profile-form');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('prof-name').value;
        const password = document.getElementById('prof-password').value;
        const fileInput = document.getElementById('profile-avatar').files[0];

        const formData = new FormData();
        formData.append('name', name);
        if (password) {
          formData.append('password', password);
        }
        if (fileInput) {
          formData.append('profilePic', fileInput);
        }

        try {
          const res = await apiRequest('/users/me', {
            method: 'PUT',
            body: formData
          });
          const data = await res.json();
          if (data.success) {
            showToast('Profile updated successfully!', 'success');
            // Cache updated profile info
            const cachedUser = getUser();
            cachedUser.name = data.data.name;
            cachedUser.profilePic = data.data.profilePic;
            localStorage.setItem('user', JSON.stringify(cachedUser));
            
            // Reload page to reflect changes in sidebar
            setTimeout(() => {
              window.location.reload();
            }, 1000);
          } else {
            showToast(data.message, 'error');
          }
        } catch (err) {
          showToast('Failed to save profile changes.', 'error');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadProfile();
    });
  </script>
</body>
</html>
